[build]
  command   = "npm run build"
  publish   = "dist"
[build.environment]
  PYTHON_VERSION = "3.11"
  # auto-pull GH secrets
  NETLIFY_AUTH_TOKEN = "${{NETLIFY_AUTH_TOKEN}}"
  NETLIFY_SITE_ID    = "${{NETLIFY_SITE_ID}}"
  SP1RL_ENV         = "production"
[[functions]]
  directory = "netlify/functions"
