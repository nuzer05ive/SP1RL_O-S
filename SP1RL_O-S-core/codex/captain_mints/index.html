<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Captain Mints</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Captain Mints</h1>
  <div class="badges">
    <span class="badge">TEAL: <span id="teal-lock"></span></span>
    <span class="badge">mints: <span id="m-count">0</span></span>
    <span class="badge">treasury: <span id="t-count">0</span></span>
  </div>
  <button id="fire">fire !</button>
  <canvas id="spiral"></canvas>
  <canvas id="chart"></canvas>
  <ul id="treasury"></ul>
  <script type="importmap" src="/SP1RL_O-S-core/codex/_runtime/importmap.json"></script>
  <script type="module">
    window.SP1RL = await import('sp1rl:loader');
    await SP1RL.init();
    window.MODS = await SP1RL.require(['teal-math@stable','plots@stable']).withFallbacks();
  </script>
  <script src="app.js"></script>
</body>
</html>
