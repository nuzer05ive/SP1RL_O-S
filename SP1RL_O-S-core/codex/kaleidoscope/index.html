<!doctype html><html lang="en"><head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SP1RL · Kaleidoscope</title>
  <link rel="stylesheet" href="styles.css"/>
</head><body>
  <header class="top">
    <h1>SP1RL · Kaleidoscope</h1>
    <button id="settingsBtn" class="ghost">Settings</button>
  </header>

  <main class="wrap">
    <div class="viewport">
      <svg id="scope" viewBox="0 0 1000 1000" aria-label="Kaleidoscope">
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <g id="outerRing"></g>
        <g id="midRing"></g>
        <g id="innerRing"></g>
        <g id="tealLock"><circle cx="500" cy="500" r="32" class="teal-core"/></g>
      </svg>
      <button id="portalBtn" class="portal">Open</button>
    </div>

    <section class="panel">
      <div class="row">
        <label>Repo</label>
        <input id="repoUser" placeholder="user/org">
        <input id="repoName" placeholder="repo (SP1RL_O-S)">
      </div>
      <div class="row">
        <label>URL template</label>
        <input id="urlTpl" placeholder="https://rawcdn.githack.com/{user}/{repo}/{branch}/SP1RL_O-S-core/{path}">
      </div>
      <div class="row">
        <label>GitHub token (opt)</label>
        <input id="ghToken" placeholder="ghp_***"><button id="fetchBranches" class="ghost">Fetch</button>
      </div>
      <div class="row">
        <label>Branch</label><select id="branch"></select>
        <label>Module</label>
        <select id="module">
          <option value="codex/captain_mints/index.html">captain_mints</option>
          <option value="codex/_registry/deploy/portal.html">registry_portal</option>
          <option value="codex/home/index.html">home_portal</option>
          <option value="">(custom)</option>
        </select>
      </div>
      <div class="row">
        <label>Custom path</label>
        <input id="customPath" placeholder="codex/.../index.html">
        <button id="savePin" class="ghost">Pin</button>
      </div>
      <div class="row small">
        <span id="status">idle</span><span id="hint"></span>
      </div>
    </section>

    <section id="overlay" class="overlay hidden">
      <div class="bar">
        <span id="targetLbl"></span>
        <button id="closeOverlay" class="ghost">Close</button>
      </div>
      <iframe id="stage" title="SP1RL app" sandbox="allow-scripts allow-same-origin"></iframe>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body></html>
