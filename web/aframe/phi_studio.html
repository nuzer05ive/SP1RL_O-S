<!doctype html><html><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SP1RL φ‑Seed Studio</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="./js/phi_controls.js"></script>
<style>body{background:#0b0b0e;color:#fff;font-family:system-ui}</style>
</head><body>
<a-scene background="color: #050509">
  <a-entity id="cameraRig" position="0 1.6 2">
    <a-entity camera look-controls wasd-controls></a-entity>
  </a-entity>

  <!-- φ‑seed: concentric shells + golden spiral “suggestion” ray -->
  <a-entity id="phiSeed" position="0 1.5 -2" phi-seed></a-entity>

  <!-- HUD hints -->
  <a-entity position="0 2 -1.2" text="value: tap: Next • double-tap: Deepen • hold(3s): Shell CLI; align: center; width: 2.2"></a-entity>
</a-scene>
</body></html>
