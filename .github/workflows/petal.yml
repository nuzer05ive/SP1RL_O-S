on:
  push:
    branches: [core]
jobs:
  count-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: diff
        run: |
          base=$(git describe --tags --match 'petal-*' --abbrev=0 || echo HEAD~0)
          lines=$(git diff --numstat $base | awk '{a+=$1+$2} END{print a}')
          echo "lines=$lines" >> $GITHUB_OUTPUT
      - if: ${{ steps.diff.outputs.lines >= 136 }}
        run: echo "open-pr" >> $GITHUB_ENV
  open-pr:
    needs: count-diff
    if: env.open-pr == 'open-pr'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          k=$(git tag -l 'petal-*' | wc -l)
          node=$(python - <<PY
import math
k=$k
print(int(round((k*137.5%360)*89/360)))
PY)
          gh pr create -t "\U0001F33B Petal $k — Node $node" -b "Golden-Angle release slot $k."
  act:
    if: ${{ runner.os != 'macOS' || steps.setup-node.outputs.node-version == '18' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        id: setup-node
        with:
          node-version: 18
      - name: Local act
        if: ${{ runner.os != 'macOS' || steps.setup-node.outputs.node-version == '18' }}
        run: bash scripts/local_act.sh
