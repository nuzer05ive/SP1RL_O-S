name: Deploy to Netlify

on:
  pull_request:
    paths-ignore: ["**/*.md"]
  push:
    branches: [core]

permissions:
  contents: read

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [sp1rl-os, sp1rlos]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: {version: 9, run_install: false}

      - name: Install deps
        run: pnpm install --no-frozen-lockfile
        working-directory: apps/microsite

      - name: Build (preview)
        run: pnpm run build
        working-directory: apps/microsite

      - name: Netlify Deploy (PR preview)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./apps/microsite/dist
          deploy-message: "Preview for ${{ github.head_ref }}"
          production-branch: core
          production-deploy: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: {version: 9, run_install: false}

      - name: Install deps
        run: pnpm install --no-frozen-lockfile
        working-directory: apps/microsite

      - name: Build (production)
        run: pnpm run build
        working-directory: apps/microsite

      - name: Netlify Deploy (core)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./apps/microsite/dist
          production-branch: core
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
