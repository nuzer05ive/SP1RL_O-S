name: Deploy Microsite
on:
  push:
    branches: [core]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: {version: 9}
      - run: pnpm install --frozen-lockfile
      - run: python scripts/netlify_sync_env.py
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
      - name: Build & Publish to Netlify
        if: env.NETLIFY_AUTH_TOKEN != ''
        run: |
          pnpm -F microsite run build
          npx netlify deploy --prod -s $NETLIFY_SITE_ID -d apps/microsite/dist
      - name: GitHub Pages Fallback
        if: env.NETLIFY_AUTH_TOKEN == ''
        run: |
          pnpm -F microsite run build
          npx gh-pages -d apps/microsite/dist -b gh-pages
