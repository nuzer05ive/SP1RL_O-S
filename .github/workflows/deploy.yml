name: Deploy to Netlify

on:
  pull_request:
    paths-ignore: ["**/*.md"]
  push:
    branches: [core]

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: {version: ${{ env.PNPM_VERSION }}, run_install: false}
      - uses: actions/setup-node@v4
        with: {node-version: ${{ env.NODE_VERSION }}, cache: pnpm}

      - name: Install deps
        run: pnpm install --no-frozen-lockfile
        working-directory: apps/microsite

      - name: Build (PR preview)
        run: pnpm run build
        working-directory: apps/microsite

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: {version: ${{ env.PNPM_VERSION }}, run_install: false}
      - uses: actions/setup-node@v4
        with: {node-version: ${{ env.NODE_VERSION }}, cache: pnpm}

      - name: Install deps
        run: pnpm install --no-frozen-lockfile
        working-directory: apps/microsite

      - name: Build (CI)
        run: pnpm run build
        working-directory: apps/microsite

      - name: Netlify production deploy (core)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./apps/microsite/dist
          production-branch: core
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ env.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:   ${{ env.NETLIFY_SITE_ID }}
