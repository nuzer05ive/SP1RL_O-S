name: Deploy to Netlify

on:
  pull_request:
    paths-ignore: ["**/*.md"]   # docs don't trigger build
  push:
    branches: [core]

permissions:
  contents: read

jobs:

  # ─── Deploy-preview for every PR ──────────────────────────────────────────── #
  preview:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: {version: 9, run_install: false}

      - name: Install deps
        run: pnpm install --no-frozen-lockfile
        working-directory: apps/microsite

      - name: Build site
        run: pnpm run build
        working-directory: apps/microsite

      - name: Netlify Deploy Preview
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./apps/microsite/dist
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:   ${{ secrets.NETLIFY_SITE_ID }}

  # ─── Live deploy on pushes to core ───────────────────────────────────────── #
  deploy:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: {version: 9, run_install: false}

      - name: Install deps
        run: pnpm install --no-frozen-lockfile
        working-directory: apps/microsite

      - name: Build site
        run: pnpm run build
        working-directory: apps/microsite

      - name: Netlify Production Deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./apps/microsite/dist
          production-branch: core
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:   ${{ secrets.NETLIFY_SITE_ID }}
