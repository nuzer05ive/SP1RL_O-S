name: Deploy to Netlify

on:
  pull_request:
    paths-ignore: ["**/*.md"]
  push:
    branches: [core]

permissions:
  contents: read

jobs:
# ───────────────────────── Pull-request preview ──────────────────────────
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      # one PR → two preview URLs (sp1rl-os & sp1rlos)
      matrix:
        site:
          - sp1rl-os   # ← Netlify site slug
          - sp1rlos
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9, run_install: false }

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: apps/microsite

      - name: Build microsite
        run: pnpm run build
        working-directory: apps/microsite

      - name: Netlify deploy preview
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./apps/microsite/dist
          production-branch: core                 # where the preview PR lives
          github-token:  ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets[format('NETLIFY_AUTH_TOKEN_{0}', matrix.site)] }}
          NETLIFY_SITE_ID:    ${{ secrets[format('NETLIFY_SITE_ID_{0}',    matrix.site)] }}

# ───────────────────────── Push → production deploy ──────────────────────
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9, run_install: false }

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: apps/microsite

      - name: Build microsite
        run: pnpm run build
        working-directory: apps/microsite

      - name: Netlify production deploy (core branch)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./apps/microsite/dist
          production-branch: core           # push output into /core
          production-deploy: true           # mark this as the live site
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
