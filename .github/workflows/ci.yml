name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure package has __init__
        run: |
          if [ -d spirl_ghost ] && [ ! -f spirl_ghost/__init__.py ]; then
            touch spirl_ghost/__init__.py
          fi

      - name: Resolve PYTHONPATH
        run: |
          if [ -d src ]; then
            echo "PYTHONPATH=$GITHUB_WORKSPACE/src" >> $GITHUB_ENV
            echo "Using src/ layout"
          else
            echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
            echo "Using flat repo layout"
          fi

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          # If you *do* have packaging, this will install your project for real:
          if [ -f pyproject.toml ] || [ -f setup.cfg ] || [ -f setup.py ]; then
            python -m pip install -e .
          fi

      - name: Run tests
        run: pytest -q

      - name: Ensure artifact dir
        if: always()
        run: mkdir -p out

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: out
          path: out/**
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6
