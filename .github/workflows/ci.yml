name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  # Part 1 — Breath-in: test matrix writes raw coverage data
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ensure package markers
        run: |
          if [ -d spirl_ghost ] && [ ! -f spirl_ghost/__init__.py ]; then
            touch spirl_ghost/__init__.py
          fi

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install -U pytest pytest-cov coverage
          pip install -e .

      - name: Run tests with coverage (unique data file)
        env:
          # Make each matrix write a different data file
          COVERAGE_FILE: .coverage.py${{ matrix.python-version }}
        run: |
          pytest --cov=spirl_ghost --cov-report=term-missing --cov-fail-under=100

      - name: Upload raw coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: .coverage.py*
          if-no-files-found: error
          retention-days: 7

  # Part 2/3 — Hold/Gate + Breath-out: combine & publish once
  coverage-combine:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python (for coverage tools)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install coverage
        run: pip install coverage

      - name: Download all coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
          path: covdata
          merge-multiple: true

      - name: Combine, report, enforce 100%
        run: |
          mkdir -p out
          coverage combine covdata
          coverage report --fail-under=100 | tee out/coverage-summary.txt
          coverage xml -o out/coverage-combined.xml
          coverage html -d out/htmlcov

      - name: Publish combined artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: out/**
          retention-days: 7
