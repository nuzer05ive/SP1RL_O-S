name: CI

on:
  pull_request:
  push:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11']
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ensure package markers
        run: |
          if [ -d spirl_ghost ] && [ ! -f spirl_ghost/__init__.py ]; then
            touch spirl_ghost/__init__.py
          fi

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          python -m pip install -U pytest pytest-cov
          python -m pip install -e .

      - name: Prepare report dir
        run: mkdir -p out

      - name: Run tests (JUnit + Coverage)
        run: |
          pytest \
            --junitxml=out/junit-${{ matrix.os }}-py${{ matrix.python-version }}.xml \
            --cov=spirl_ghost \
            --cov-report=xml:out/coverage-${{ matrix.os }}-py${{ matrix.python.version }}.xml \
            --cov-report=html:out/htmlcov-${{ matrix.os }}-py${{ matrix.python-version }} \
            --cov-report=term-missing

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}-py${{ matrix.python-version }}
          path: out/**
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6
