# .github/workflows/sync-env.yml
name: Sync env to Netlify

on:
  push:
    branches: [core]        # run on every push to core
  workflow_dispatch:        # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Check out repository
      - uses: actions/checkout@v3

      # 2️⃣ Netlify CLI (latest published tag = v3)
      - uses: netlify/actions/cli@v3      # ← fixed («/cli», not plain /actions)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

      # 3️⃣ Push everything in .env.example to Netlify in one shot
      - name: Sync variables
        run: npx netlify env:set --json "$(jq -r tojson < .env.example)"
