name: Sync .env to Netlify

on:
  push:
    branches: [core]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID:   ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4

      # lightweight wrapper around official CLI
      - uses: joseluisq/netlify-cli@v4

      - name: Push key-value pairs from .env.example
        run: |
          env_json=$(jq -R -s -c 'split("\n") | map(select(length>0)) |
                     map(split("=")) | from_entries' < .env.example)
          echo "$env_json" | npx netlify env:set --json
